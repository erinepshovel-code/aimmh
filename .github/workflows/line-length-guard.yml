name: Line Length Guard

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  enforce-max-lines:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Enforce max 400 lines per source file
        run: python scripts/check_max_lines.py
